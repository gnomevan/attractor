<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>KAM Mosaic: Islands of Order, Seas of Chaos</title>
<style>
  body { margin: 0; padding: 20px; background: #faf8f0; font-family: system-ui, -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; }
  @media (prefers-color-scheme: dark) { body { background: #121210; color: #c2c0b6; } }
  canvas { width: 100%; max-width: 900px; display: block; border-radius: 12px; }
  .ctrl { display:flex; align-items:center; gap:12px; margin:12px 0 0; font-size:14px; color:#888; max-width:900px; width:100%; }
  .ctrl input[type=range] { flex:1; }
  .ctrl span { min-width:70px; text-align:right; }
  h1 { font-size: 18px; font-weight: 500; margin: 0 0 4px; }
  @media (prefers-color-scheme: dark) { h1 { color: #e0ded6; } .ctrl { color: #9c9a92; } }
  .sub { font-size: 13px; color: #888; margin: 0 0 16px; }
</style>
</head>
<body>
<h1>KAM mosaic: islands of order, seas of chaos</h1>
<p class="sub">Chirikov standard map — drag the slider to break the tori</p>
<canvas id="c" width="1360" height="1020"></canvas>
<div class="ctrl">
  <span style="min-width:auto">Perturbation</span>
  <input type="range" id="kSlider" min="0.2" max="3.5" step="0.01" value="0.97" oninput="draw(parseFloat(this.value))">
  <span id="kLabel">K = 0.97</span>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

function draw(K) {
  document.getElementById('kLabel').textContent = 'K = ' + K.toFixed(2);
  
  const dark = matchMedia('(prefers-color-scheme: dark)').matches;
  const img = ctx.createImageData(W, H);
  const data = img.data;
  
  if (dark) {
    for (let i = 0; i < data.length; i += 4) { data[i]=18; data[i+1]=18; data[i+2]=16; data[i+3]=255; }
  } else {
    for (let i = 0; i < data.length; i += 4) { data[i]=250; data[i+1]=248; data[i+2]=240; data[i+3]=255; }
  }
  
  const visits = new Float32Array(W * H);
  const lyap = new Float32Array(W * H);
  const lyapCount = new Uint16Array(W * H);
  
  const nOrbits = 400;
  const nIter = 2000;
  const TWO_PI = 2 * Math.PI;
  
  for (let orb = 0; orb < nOrbits; orb++) {
    let theta = Math.random() * TWO_PI;
    let p = (Math.random() - 0.5) * TWO_PI;
    
    let lyapSum = 0;
    
    for (let i = 0; i < nIter; i++) {
      p = p + K * Math.sin(theta);
      theta = theta + p;
      
      let dfdtheta = Math.abs(1 + K * Math.cos(theta - p));
      if (dfdtheta > 0) lyapSum += Math.log(dfdtheta);
      
      let tNorm = ((theta % TWO_PI) + TWO_PI) % TWO_PI;
      let pNorm = ((p % TWO_PI) + TWO_PI) % TWO_PI;
      
      let px = Math.floor(tNorm / TWO_PI * W);
      let py = Math.floor((1 - pNorm / TWO_PI) * H);
      
      if (px >= 0 && px < W && py >= 0 && py < H) {
        let idx = py * W + px;
        visits[idx]++;
        if (i > 100) {
          lyap[idx] += lyapSum / (i + 1);
          lyapCount[idx]++;
        }
      }
    }
  }
  
  for (let orb = 0; orb < 150; orb++) {
    let theta, p;
    let region = Math.random();
    if (region < 0.3) {
      theta = Math.PI + (Math.random() - 0.5) * 0.8;
      p = Math.PI + (Math.random() - 0.5) * 0.8;
    } else if (region < 0.6) {
      theta = (Math.random() - 0.5) * 0.6;
      p = (Math.random() - 0.5) * 0.6;
    } else {
      theta = Math.random() * TWO_PI;
      p = Math.random() * TWO_PI;
    }
    
    let lyapSum = 0;
    for (let i = 0; i < 4000; i++) {
      p = p + K * Math.sin(theta);
      theta = theta + p;
      
      let dfdtheta = Math.abs(1 + K * Math.cos(theta - p));
      if (dfdtheta > 0) lyapSum += Math.log(dfdtheta);
      
      let tNorm = ((theta % TWO_PI) + TWO_PI) % TWO_PI;
      let pNorm = ((p % TWO_PI) + TWO_PI) % TWO_PI;
      
      let px = Math.floor(tNorm / TWO_PI * W);
      let py = Math.floor((1 - pNorm / TWO_PI) * H);
      
      if (px >= 0 && px < W && py >= 0 && py < H) {
        let idx = py * W + px;
        visits[idx] += 0.5;
        if (i > 200) {
          lyap[idx] += lyapSum / (i + 1);
          lyapCount[idx]++;
        }
      }
    }
  }
  
  let maxV = 0;
  for (let i = 0; i < visits.length; i++) if (visits[i] > maxV) maxV = visits[i];
  
  for (let i = 0; i < lyap.length; i++) {
    if (lyapCount[i] > 0) lyap[i] /= lyapCount[i];
  }
  
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      let idx = y * W + x;
      let v = visits[idx];
      if (v === 0) continue;
      
      let density = Math.pow(v / maxV, 0.35);
      let le = lyap[idx];
      
      let r, g, b, a;
      
      if (le <= 0.02) {
        let t = Math.min(density * 2.5, 1);
        if (dark) {
          r = Math.floor(30 + 60 * t);
          g = Math.floor(90 + 130 * t);
          b = Math.floor(120 + 135 * t);
        } else {
          r = Math.floor(20 + 50 * t);
          g = Math.floor(60 + 120 * t);
          b = Math.floor(100 + 155 * t);
        }
        a = Math.floor(80 + 175 * Math.pow(t, 0.6));
      } else if (le < 0.15) {
        let blend = (le - 0.02) / 0.13;
        let t = Math.min(density * 2, 1);
        if (dark) {
          r = Math.floor((30 + 60*t) * (1-blend) + (180 + 50*t) * blend);
          g = Math.floor((90 + 130*t) * (1-blend) + (100 + 60*t) * blend);
          b = Math.floor((120 + 135*t) * (1-blend) + (40 + 30*t) * blend);
        } else {
          r = Math.floor((20 + 50*t) * (1-blend) + (160 + 70*t) * blend);
          g = Math.floor((60 + 120*t) * (1-blend) + (70 + 40*t) * blend);
          b = Math.floor((100 + 155*t) * (1-blend) + (30 + 20*t) * blend);
        }
        a = Math.floor(60 + 195 * Math.pow(t, 0.5));
      } else {
        let t = Math.min(density * 1.8, 1);
        let heat = Math.min(le / 0.8, 1);
        if (dark) {
          r = Math.floor(140 + 100 * heat * t);
          g = Math.floor(60 + 80 * (1 - heat) * t);
          b = Math.floor(30 + 20 * t);
        } else {
          r = Math.floor(120 + 110 * heat * t);
          g = Math.floor(40 + 60 * (1 - heat) * t);
          b = Math.floor(15 + 15 * t);
        }
        a = Math.floor(40 + 180 * Math.pow(t, 0.5));
      }
      
      let pi = (y * W + x) * 4;
      let oa = data[pi + 3] / 255;
      let na = a / 255;
      let outA = na + oa * (1 - na);
      if (outA > 0) {
        data[pi]     = Math.floor((r * na + data[pi] * oa * (1 - na)) / outA);
        data[pi + 1] = Math.floor((g * na + data[pi+1] * oa * (1 - na)) / outA);
        data[pi + 2] = Math.floor((b * na + data[pi+2] * oa * (1 - na)) / outA);
        data[pi + 3] = Math.floor(outA * 255);
      }
    }
  }
  
  ctx.putImageData(img, 0, 0);
}

draw(0.97);
</script>
</body>
</html>
